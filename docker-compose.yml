version: "3.8"

services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: etl_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    container_name: etl_mock_api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: etl_orchestrator
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MOCK_API_URL: ${MOCK_API_URL}
    depends_on:
      db:
        condition: service_healthy
      mock-api:
        condition: service_healthy

volumes:
  pg_data: